# Shareable rare / named respawn database — EverQuest Legends.
#
# Community-editable: copy, merge, and share this file. The overlay loads it
# automatically (it sits next to the config; override the path with
# `[general] rare_db`). Your personal `[[rare]]` entries in the config win over
# anything here with the same name.
#
# Each entry:
#   name             exact mob name, as in "You have slain X!" / "X has been slain by"
#   respawn_seconds  death -> next spawn (for placeholder mobs, treat as EARLIEST pop)
#   zone             informational
#   icon             optional spell-icon index; a colour square is used otherwise
#   notes            optional
#
# Respawns here were learned from kill-timestamp gaps in a real log (minimum
# gap during a camped session ≈ the respawn cycle). Refine as you gather data.

